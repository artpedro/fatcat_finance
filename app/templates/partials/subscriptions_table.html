<div class="card tw">
  <table>
    <thead>
      <tr>
        <th>Descrição</th>
        <th>Pagamento</th>
        <th>Valor mensal</th>
        <th>Período</th>
        <th>Status ciclo</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      {% for row in subscriptions_rows %}
      <tr>
        <td>{{ row.sub.description }}</td>
        <td>{{ row.pay_label }}</td>
        <td>{{ row.amount_fmt }}</td>
        <td>{{ row.period }}</td>
        <td>{% if row.active %}<span class="badge bg-green">Neste ciclo</span>{% else %}<span class="badge bg-gray">Fora do ciclo</span>{% endif %}</td>
        <td>
          <button type="button" class="btn btn-ghost btn-sm" hx-get="/subscriptions/form/{{ row.sub.id }}?{{ query }}" hx-target="#sub-form-wrap" hx-swap="innerHTML">Editar</button>
          <button type="button" class="btn btn-danger btn-sm" hx-delete="/subscriptions/{{ row.sub.id }}?{{ query }}" hx-target="#subscriptions-table-wrap" hx-swap="innerHTML">Excluir</button>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="6">Nenhuma assinatura cadastrada.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
