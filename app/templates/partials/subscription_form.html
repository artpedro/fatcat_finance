<form class="blk grid gap-3 md:grid-cols-3"
      data-sub-term
      hx-post="/subscriptions/save?{{ query }}"
      hx-target="{{ form_hx_target }}"
      hx-swap="innerHTML">
  <input type="hidden" name="return_partial" value="{{ return_partial }}">
  <input type="hidden" name="sub_id" value="{{ sub.id if sub else '' }}">
  <label class="text-sm md:col-span-2"><span class="fg-label">Descrição</span><input class="mt-1" name="description" required value="{{ sub.description if sub else '' }}"></label>
  <label class="text-sm"><span class="fg-label">Valor mensal</span><input class="mt-1" type="number" min="0.01" step="0.01" name="amount_monthly" required value="{{ sub.amount_monthly if sub else '' }}"></label>
  <label class="text-sm"><span class="fg-label">Dia cobrança</span><input class="mt-1" type="number" min="1" max="31" name="billing_day" value="{{ sub.billing_day if sub else 5 }}"></label>
  <label class="text-sm"><span class="fg-label">Pagamento</span>
    {% set method = sub.payment_method if sub else 'card' %}
    <select class="mt-1" name="payment_method">
      <option value="card" {% if method == 'card' %}selected{% endif %}>Cartão</option>
      <option value="pix" {% if method == 'pix' %}selected{% endif %}>PIX</option>
    </select>
  </label>
  <label class="text-sm"><span class="fg-label">Cartão</span>
    <select class="mt-1" name="card_id">
      <option value="">—</option>
      {% for card in cards %}
      <option value="{{ card.id }}" {% if sub and sub.card_id == card.id %}selected{% endif %}>{{ card.name }}</option>
      {% endfor %}
    </select>
  </label>
  <label class="text-sm"><span class="fg-label">Início da vigência</span>
    <input class="mt-1" type="date" name="start" required value="{{ start_date_iso }}">
    <span class="hint">Use o seletor de data (o navegador exibe no formato local, ex. dd/mm/aaaa).</span>
  </label>
  <label class="text-sm"><span class="fg-label">Data final <span class="text-muted font-normal">(opcional)</span></span>
    <input class="mt-1" type="date" name="end" value="{{ end_date_iso }}">
    <span class="hint">Deixe vazio para assinatura sem término. Não preencha junto com duração em meses.</span>
  </label>
  <label class="text-sm"><span class="fg-label">Duração em meses <span class="text-muted font-normal">(opcional)</span></span>
    <input class="mt-1" type="number" min="1" name="duration_months" placeholder="—" value="{{ sub.duration_months if sub and sub.duration_months else '' }}">
    <span class="hint">Alternativa à data final. Deixe vazio se usar data ou vigência aberta.</span>
  </label>
  <label class="text-sm md:col-span-2"><span class="fg-label">Vigência</span>
    <input type="text" readonly disabled class="mt-1 input-readonly" data-sub-term-status value="">
    <span class="hint">Calculado automaticamente: sem data final e sem duração = indefinida.</span>
  </label>
  {% include "partials/category_field.html" %}
  <div class="form-actions md:col-span-3">
    <button type="button" class="btn btn-ghost" hx-get="/subscriptions/form-clear" hx-target="{{ form_cancel_target }}" hx-swap="innerHTML">Cancelar</button>
    <button class="btn btn-primary" type="submit">Salvar assinatura</button>
  </div>
</form>
