<form class="card grid md:grid-cols-3 gap-3"
      hx-post="/expenses/save?{{ query }}"
      hx-target="#expenses-table-wrap"
      hx-swap="innerHTML">
  <input type="hidden" name="expense_id" value="{{ expense.id if expense else '' }}">
  <label class="text-sm md:col-span-2">Descrição<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" name="description" required value="{{ expense.description if expense else '' }}"></label>
  <label class="text-sm">Tipo
    {% set t = expense.type if expense else 'credit' %}
    <select class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" name="exp_type" onchange="fatcatToggleType(this)">
      <option value="credit" {% if t == 'credit' %}selected{% endif %}>Credit</option>
      <option value="debit" {% if t == 'debit' %}selected{% endif %}>Debit</option>
    </select>
  </label>
  <label class="text-sm">Cartão
    <select class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" name="card_id" required>
      {% for card in cards %}
      <option value="{{ card.id }}" {% if expense and expense.card_id == card.id %}selected{% endif %}>{{ card.name }}</option>
      {% endfor %}
    </select>
  </label>
  <label class="text-sm">Valor<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="number" min="0.01" step="0.01" name="amount_total" required value="{{ expense.amount_total if expense else '' }}"></label>
  <label class="text-sm" id="installments-wrap">Parcelas<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="number" min="1" max="60" name="installments" value="{{ expense.installments if expense else 1 }}"></label>
  <label class="text-sm">Data<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="date" name="purchase_date" required value="{{ purchase_date }}"></label>
  <label class="text-sm">Categoria<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" name="category" value="{{ expense.category if expense else 'Outros' }}"></label>
  <div class="md:col-span-3 flex gap-2 justify-end">
    <button type="button" class="btn" hx-get="/expenses/form-clear" hx-target="#expense-form-wrap" hx-swap="innerHTML">Cancelar</button>
    <button class="btn btn-primary" type="submit">Salvar lançamento</button>
  </div>
</form>
