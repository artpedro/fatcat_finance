<form class="card grid md:grid-cols-3 gap-3"
      hx-post="/income/save?{{ query }}"
      hx-target="#income-table-wrap"
      hx-swap="innerHTML">
  <input type="hidden" name="income_id" value="{{ source.id if source else '' }}">
  <label class="text-sm md:col-span-2">Nome<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" name="name" required value="{{ source.name if source else '' }}"></label>
  <label class="text-sm">Valor<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="number" min="0" step="0.01" name="amount" required value="{{ source.amount if source else '' }}"></label>
  <label class="text-sm">Tipo<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" name="kind" value="{{ source.kind if source else 'salary' }}"></label>
  <label class="text-sm">Início<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="month" name="start" value="{{ start_val }}"></label>
  <label class="text-sm">Fim<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="month" name="end" value="{{ end_val }}"></label>
  <label class="text-sm">Recorrente
    <select class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" name="is_recurring">
      <option value="true" {% if not source or source.is_recurring %}selected{% endif %}>Sim</option>
      <option value="false" {% if source and not source.is_recurring %}selected{% endif %}>Não</option>
    </select>
  </label>
  <label class="text-sm md:col-span-2">Notas<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" name="notes" value="{{ source.notes if source else '' }}"></label>
  <div class="md:col-span-3 flex gap-2 justify-end">
    <button type="button" class="btn" hx-get="/income/form-clear" hx-target="#income-form-wrap" hx-swap="innerHTML">Cancelar</button>
    <button class="btn btn-primary" type="submit">Salvar receita</button>
  </div>
</form>
