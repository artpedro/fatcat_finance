<form class="blk grid gap-3 md:grid-cols-3"
      hx-post="/cards/save?{{ query }}"
      hx-target="#cards-table-wrap"
      hx-swap="innerHTML">
  <input type="hidden" name="card_id" value="{{ card.id if card else '' }}">
  <label class="text-sm"><span class="fg-label">Nome</span><input class="mt-1" name="name" required value="{{ card.name if card else '' }}"></label>
  <label class="text-sm"><span class="fg-label">Fechamento</span><input class="mt-1" type="number" min="0" max="31" name="closing_day" value="{{ card.closing_day if card else '' }}"></label>
  <label class="text-sm"><span class="fg-label">Vencimento</span><input class="mt-1" type="number" min="1" max="31" name="due_day" value="{{ card.due_day if card else 5 }}"></label>
  <label class="text-sm"><span class="fg-label">Cor</span><input class="mt-1" type="color" name="color" value="{{ card.color if card else '#DB8A74' }}"></label>
  <label class="text-sm"><span class="fg-label">Limite</span><input class="mt-1" type="number" step="0.01" min="0" name="limit_amount" value="{{ card.limit_amount if card else 0 }}"></label>
  <label class="text-sm"><span class="fg-label">Taxa</span>
    <select class="mt-1" name="maintenance_type">
      {% set mt = card.maintenance_type if card else 'none' %}
      <option value="none" {% if mt == 'none' %}selected{% endif %}>Sem taxa</option>
      <option value="fixed" {% if mt == 'fixed' %}selected{% endif %}>Fixa</option>
      <option value="conditional" {% if mt == 'conditional' %}selected{% endif %}>Condicional</option>
    </select>
  </label>
  <label class="text-sm md:col-span-2"><span class="fg-label">Valor taxa</span><input class="mt-1" type="number" step="0.01" min="0" name="maintenance_amount" value="{{ card.maintenance_amount if card else 0 }}"></label>
  <div class="form-actions md:col-span-3">
    <button type="button" class="btn btn-ghost" hx-get="/cards/form-clear" hx-target="#card-form-wrap" hx-swap="innerHTML">Cancelar</button>
    <button class="btn btn-primary" type="submit">Salvar cartão</button>
  </div>
</form>
