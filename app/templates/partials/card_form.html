<form class="card grid md:grid-cols-3 gap-3"
      hx-post="/cards/save?{{ query }}"
      hx-target="#cards-table-wrap"
      hx-swap="innerHTML">
  <input type="hidden" name="card_id" value="{{ card.id if card else '' }}">
  <label class="text-sm">Nome<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" name="name" required value="{{ card.name if card else '' }}"></label>
  <label class="text-sm">Fechamento<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="number" min="0" max="31" name="closing_day" value="{{ card.closing_day if card else '' }}"></label>
  <label class="text-sm">Vencimento<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="number" min="1" max="31" name="due_day" value="{{ card.due_day if card else 5 }}"></label>
  <label class="text-sm">Cor<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="color" name="color" value="{{ card.color if card else '#DB8A74' }}"></label>
  <label class="text-sm">Limite<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="number" step="0.01" min="0" name="limit_amount" value="{{ card.limit_amount if card else 0 }}"></label>
  <label class="text-sm">Taxa
    <select class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" name="maintenance_type">
      {% set mt = card.maintenance_type if card else 'none' %}
      <option value="none" {% if mt == 'none' %}selected{% endif %}>Sem taxa</option>
      <option value="fixed" {% if mt == 'fixed' %}selected{% endif %}>Fixa</option>
      <option value="conditional" {% if mt == 'conditional' %}selected{% endif %}>Condicional</option>
    </select>
  </label>
  <label class="text-sm md:col-span-2">Valor taxa<input class="w-full mt-1 rounded bg-zinc-900 border border-zinc-700 p-2" type="number" step="0.01" min="0" name="maintenance_amount" value="{{ card.maintenance_amount if card else 0 }}"></label>
  <div class="md:col-span-3 flex gap-2 justify-end">
    <button type="button" class="btn" hx-get="/cards/form-clear" hx-target="#card-form-wrap" hx-swap="innerHTML">Cancelar</button>
    <button class="btn btn-primary" type="submit">Salvar cartão</button>
  </div>
</form>
