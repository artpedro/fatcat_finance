<div class="fg" id="{{ wrap_id }}" data-category-wrap>
  <label>Categoria</label>
  <select name="category_id" required onchange="fatcatToggleNewCategory(this)">
    {% for c in categories %}
      <option value="{{ c.id }}" {% if selected_id == c.id %}selected{% endif %}>{{ c.name }}</option>
    {% endfor %}
    <option value="__new__">+ Nova categoria…</option>
  </select>
  <div class="js-new-category-prompt hidden new-cat-prompt" id="new-cat-prompt-{{ wrap_id }}">
    <p class="hint">Somente o nome é necessário.</p>
    <div class="new-cat-actions">
      <div class="fg new-cat-name-field" style="margin:0">
        <label>Nome</label>
        <input type="text" autocomplete="off" id="new-cat-name-{{ wrap_id }}" placeholder="Ex.: Pets">
      </div>
      <button type="button" class="btn btn-primary"
              hx-post="/categories/quick-create"
              hx-target="#{{ wrap_id }}"
              hx-swap="innerHTML"
              hx-vals='js:{"name": document.getElementById("new-cat-name-{{ wrap_id }}").value, "wrap_id": "{{ wrap_id }}"}'>
        Criar
      </button>
    </div>
  </div>
</div>
