{% extends "base.html" %}
{% block title %}Lançamentos - FatCat{% endblock %}
{% block content %}
<div class="space-y-4">
  <div class="flex items-center justify-between">
    <h2 class="text-2xl font-black">Lançamentos</h2>
    <button class="btn btn-primary" hx-get="/expenses/form?{{ query }}" hx-target="#expense-form-wrap" hx-swap="innerHTML">+ Novo lançamento</button>
  </div>
  <div id="expense-form-wrap"></div>
  <div id="expenses-table-wrap">
    {% include "partials/expenses_table.html" %}
  </div>
</div>
{% endblock %}
