{% extends "base.html" %}
{% block title %}Assinaturas - FatCat{% endblock %}
{% block content %}
<div class="space-y-4">
  <div class="flex items-center justify-between">
    <h2 class="text-2xl font-black">Assinaturas</h2>
    <button class="btn btn-primary" hx-get="/subscriptions/form?{{ query }}" hx-target="#sub-form-wrap" hx-swap="innerHTML">+ Nova assinatura</button>
  </div>
  <div id="sub-form-wrap"></div>
  <div id="subscriptions-table-wrap">
    {% include "partials/subscriptions_table.html" %}
  </div>
</div>
{% endblock %}
