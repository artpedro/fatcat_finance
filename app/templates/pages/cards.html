{% extends "base.html" %}
{% block title %}Cartões - FatCat{% endblock %}
{% block content %}
<div class="stack-gap">
  <div class="ph">
    <h2>Cartões</h2>
    <button type="button" class="btn btn-primary" hx-get="/cards/form?{{ query }}" hx-target="#card-form-wrap" hx-swap="innerHTML">+ Adicionar cartão</button>
  </div>
  <div id="card-form-wrap"></div>
  <div id="cards-table-wrap">
    {% include "partials/cards_table.html" %}
  </div>
  <div id="bill-history-wrap"></div>
</div>
{% endblock %}
